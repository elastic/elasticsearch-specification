# Overlays that are specific to the Elasticsearch Serverless OpenAPI document
overlay: 1.0.0
info:
  title: Overlays for the Elasticsearch Serverless OpenAPI document
  version: 0.0.1
actions:
  - target: '$.info'
    description: Add a document description and feedback link
    update:
      title: Elasticsearch Serverless API
      description: >
        ## Documentation source and versions
        
        This documentation is derived from the `main` branch of the [elasticsearch-specification](https://github.com/elastic/elasticsearch-specification) repository.
        It is provided under license [Attribution-NonCommercial-NoDerivatives 4.0 International](https://creativecommons.org/licenses/by-nc-nd/4.0/).
      x-doc-license:
        name: Attribution-NonCommercial-NoDerivatives 4.0 International
        url: 'https://creativecommons.org/licenses/by-nc-nd/4.0/'
      x-feedbackLink:
        label: Feedback
        url: https://github.com/elastic/docs-content/issues/new?assignees=&labels=feedback%2Ccommunity&projects=&template=api-feedback.yaml&title=%5BFeedback%5D%3A+
# Add security details
  - target: '$.components'
    description: Add securitySchemes
    update:
      securitySchemes:
        apiKeyAuth:
          description: |
            Elasticsearch APIs use key-based authentication.
            You must create an API key and use the encoded value in the request header.
            For example:
            
            
            ```
            curl -X GET "${ES_URL}/_cat/indices?v=true" \
              -H "Authorization: ApiKey ${API_KEY}"
            ```
            
            For more information about where to find API keys for the Elasticsearch endpoint (${ES_URL}) for a project, go to [Get started with Elasticsearch Serverless](https://www.elastic.co/docs/solutions/search/serverless-elasticsearch-get-started).
          in: header
          name: Authorization
          type: apiKey
  - target: '$'
    description: Add document security
    update:
      security:
        - apiKeyAuth: []
  - target: "$.paths['/{index}'].put.requestBody.content['application/json'].examples.indicesCreateRequestExample1"
    description: Use a Serverless-compatible create index example
    update:
      description: Create an index with default settings.
      value: "{}"
  - target: "$.paths['/{index}'].put.requestBody.content['application/json'].examples.indicesCreateRequestExample2"
    description: Use a Serverless-compatible create index with mappings example
    update:
      value: "{\n  \"mappings\": {\n    \"properties\": {\n      \"field1\": { \"type\": \"text\" }\n    }\n  }\n}"
  - target: "$.paths['/{index}'].put.requestBody.content['application/json'].examples.indicesCreateRequestExample3"
    description: Use a Serverless-compatible create index with aliases example
    update:
      value: "{\n  \"aliases\": {\n    \"alias_1\": {},\n    \"alias_2\": {\n      \"filter\": {\n        \"term\": {\n          \"user.id\": \"kimchy\"\n        }\n      }\n    }\n  }\n}"
  - target: "$.paths['/{index}'].put['x-codeSamples']"
    description: Remove stack-only create index code samples before replacing them
    remove: true
  - target: "$.paths['/{index}'].put"
    description: Use Serverless-compatible code samples for create index
    update:
      x-codeSamples:
        - lang: Console
          source: |
            PUT /my-index-000001
            {}
        - lang: Python
          source: |
            resp = client.indices.create(
                index="my-index-000001",
            )
        - lang: JavaScript
          source: |
            const response = await client.indices.create({
              index: "my-index-000001",
            });
        - lang: Ruby
          source: |
            response = client.indices.create(
              index: "my-index-000001"
            )
        - lang: PHP
          source: |
            $resp = $client->indices()->create([
                "index" => "my-index-000001",
            ]);
        - lang: curl
          source: |
            curl -X PUT -H "Authorization: ApiKey $ELASTIC_API_KEY" "$ELASTICSEARCH_URL/my-index-000001"
        - lang: Java
          source: |
            client.indices().create(c -> c
                .index("my-index-000001")
            );
