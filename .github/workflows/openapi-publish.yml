name: OpenAPI Publish

on:
  push:
    branches:
      - 'main'
      - '[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-lint-publish:
    runs-on: ubuntu-latest
    # Avoid running on forks
    if: github.repository_owner == 'elastic'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Build docs-final OpenAPI specs
        uses: ./.github/actions/build-openapi-docs

      # TODO: swap to elastic/docs-actions/openapi/lint@v1 once released (elastic/docs-actions#207)
      - name: Lint stateful spec
        uses: elastic/docs-actions/openapi/lint@355df64f39af21900e4d84afefd093f6b16bc841
        with:
          spec-path: output/openapi/elasticsearch-openapi-docs-final.json

      - name: Lint serverless spec
        uses: elastic/docs-actions/openapi/lint@355df64f39af21900e4d84afefd093f6b16bc841
        with:
          spec-path: output/openapi/elasticsearch-serverless-openapi-docs-final.json

      # TODO: swap to elastic/docs-actions/openapi/upload@v1 once released (elastic/docs-actions#208)
      - name: Publish stateful spec
        uses: elastic/docs-actions/openapi/upload@52cc07161c895346db500376bfd58a37ed427f41
        with:
          spec-path: output/openapi/elasticsearch-openapi-docs-final.json
          spec-name: elasticsearch

      # Serverless is always-latest: only publish from main.
      - name: Publish serverless spec
        if: github.ref_name == 'main'
        uses: elastic/docs-actions/openapi/upload@52cc07161c895346db500376bfd58a37ed427f41
        with:
          spec-path: output/openapi/elasticsearch-serverless-openapi-docs-final.json
          spec-name: elasticsearch-serverless
