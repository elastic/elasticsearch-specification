name: Kibana type check analysis

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest Buildkite build
        id: build
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        run: |
          BUILD=$(curl -sf "https://api.buildkite.com/v2/organizations/elastic/pipelines/kibana-type-checks/builds?per_page=1&branch=main" \
            -H "Authorization: Bearer $BUILDKITE_API_TOKEN")

          STATE=$(echo "$BUILD" | jq -r '.[0].state')
          BUILD_NUMBER=$(echo "$BUILD" | jq -r '.[0].number')
          BUILD_URL=$(echo "$BUILD" | jq -r '.[0].web_url')

          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

          echo "Latest build #$BUILD_NUMBER state: $STATE"

      - name: Extract tsc errors from build log
        if: steps.build.outputs.state == 'failed'
        id: errors
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
        run: |
          JOBS=$(curl -sf "https://api.buildkite.com/v2/organizations/elastic/pipelines/kibana-type-checks/builds/${{ steps.build.outputs.build_number }}/jobs" \
            -H "Authorization: Bearer $BUILDKITE_API_TOKEN")

          JOB_ID=$(echo "$JOBS" | jq -r '.[] | select(.state == "failed") | .id' | head -1)

          curl -sf "https://api.buildkite.com/v2/organizations/elastic/pipelines/kibana-type-checks/builds/${{ steps.build.outputs.build_number }}/jobs/$JOB_ID/log" \
            -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
            | jq -r '.content' \
            | grep -E "error TS[0-9]+" | head -100 > /tmp/tsc-errors.txt || true

          COUNT=$(grep -c "error TS" /tmp/tsc-errors.txt || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT tsc errors"

      - name: Analyze with Claude
        if: steps.build.outputs.state == 'failed' && steps.errors.outputs.count != '0'
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
        run: |
          TSC_ERRORS=$(cat /tmp/tsc-errors.txt)

          jq -n \
            --arg errors "$TSC_ERRORS" \
            '{
              model: "llm-gateway/claude-sonnet-4-6",
              max_tokens: 2048,
              messages: [{
                role: "user",
                content: ("A daily pipeline generates a fresh Elasticsearch JS client from the main branch of the Elasticsearch specification (using elastic-client-generator-js), installs it into Kibana main, then runs Kibana TypeScript type checking. It has failed with these tsc errors:\n\n" + $errors + "\n\nFor each error classify it as one of:\n- GENERATOR: fixable in elastic-client-generator-js (wrong type inference, missing types, incorrect codegen output, body type dropped)\n- SPEC: the Elasticsearch specification has wrong or missing type information\n- KIBANA: Kibana code needs to be updated to match the improved types (e.g. removing now-unnecessary @ts-expect-error comments)\n- UNKNOWN: cannot determine from the error alone\n\nGroup errors by classification. For GENERATOR errors, describe a concrete fix with enough detail for a developer to act on it.")
              }]
            }' \
            | curl -sf "https://elastic.litellm-prod.ai/chat/completions" \
              -H "Authorization: Bearer $LITELLM_API_KEY" \
              -H "content-type: application/json" \
              -d @- \
            | jq -r '.choices[0].message.content' > /tmp/analysis.txt

          cat /tmp/analysis.txt

          {
            echo 'ANALYSIS<<EOF'
            cat /tmp/analysis.txt
            echo EOF
          } >> $GITHUB_ENV

      - name: Open issue in generator for GENERATOR errors
        if: steps.build.outputs.state == 'failed' && steps.errors.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          if grep -q "GENERATOR" /tmp/analysis.txt; then
            gh issue create \
              --repo elastic/elastic-client-generator-js \
              --title "Kibana type check: generator fixes needed - $(date +%Y-%m-%d)" \
              --body "Buildkite build: ${{ steps.build.outputs.build_url }}

          $ANALYSIS"
          fi

      - name: Post analysis to Slack
        if: steps.build.outputs.state == 'failed' && steps.errors.outputs.count != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "content-type: application/json" \
            -d "$(jq -n \
              --arg text "Kibana type check failed - $(date +%Y-%m-%d)\n\n$ANALYSIS\n\nBuildkite: ${{ steps.build.outputs.build_url }}" \
              '{text: $text}')"
