summary: A text embedding task targeting the global endpoint
description:
  Run `PUT _inference/text_embedding/google_vertex_ai_embeddings_global` to create an inference endpoint that performs a
  `text_embedding` task against the Google Vertex AI global endpoint. Omit `location` to target the global endpoint
  (`https://aiplatform.googleapis.com`) instead of a regional one.
method_request: 'PUT _inference/text_embedding/google_vertex_ai_embeddings_global'
# type: "request"
value: |-
  {
      "service": "googlevertexai",
      "service_settings": {
          "service_account_json": "service-account-json",
          "model_id": "model-id",
          "project_id": "project-id"
      }
  }
